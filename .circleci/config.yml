version: 2.1
orbs:
  architect: giantswarm/architect@9.6.0

workflows:
  go-build:
    jobs:
    - architect/go-build:
        context: architect
        binary: architect
        architectures: "linux/amd64,linux/arm64,darwin/amd64,darwin/arm64,windows/amd64,windows/arm64"
        # Needed to trigger job also on git tag.
        filters:
          tags:
            only: /^v.*/

    - architect/push-to-registries:
        context: architect
        name: push-to-registries
        requires:
          - architect/go-build
        platforms: "linux/amd64,linux/arm64"
        registries-data: |-
          public gsoci.azurecr.io ACR_GSOCI_USERNAME ACR_GSOCI_PASSWORD true
        filters:
            # Needed to trigger job also on git tag.
          tags:
            only: /^v.*/
          branches:
            ignore:
              - main
              - master

    - architect/upload-release-assets:
        context: architect
        name: upload-release-assets
        binary: architect
        requires:
          - architect/go-build
        filters:
          tags:
            only: /^v.*/
          branches:
            ignore: /.*/
